[supervisord]
nodaemon=true
logfile=/app/logs/supervisord.log
pidfile=/var/run/supervisord.pid

[program:flask_app]
command=python /app/main.py
directory=/app
autostart=true
autorestart=true
stdout_logfile=/app/logs/flask.stdout.log
stderr_logfile=/app/logs/flask.stderr.log

[program:watcher_service]
command=python /app/services/watcher.py
directory=/app
autostart=true
autorestart=true
stdout_logfile=/app/logs/watcher.stdout.log
stderr_logfile=/app/logs/watcher.stderr.log
