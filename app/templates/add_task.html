<!DOCTYPE html>
<html lang="ru" class="dark">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Добавить поручение — Smart Control</title>
    <script src="/task/static/js/tailwind.min.js"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: { extend: { colors: { darkBg: '#0f172a', cardBg: '#1e293b' } } }
        }
    </script>
    <style>
        /* Local fonts only */

        * {
            font-family: 'Inter', sans-serif;
            box-sizing: border-box;
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .card-enter {
            animation: slideUp 0.5s cubic-bezier(.22, .68, 0, 1.2) forwards;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
            }

            to {
                opacity: 1;
            }
        }

        .fade-in {
            animation: fadeIn 0.6s ease forwards;
        }

        /* Поля формы */
        .form-input {
            background: #0f172a;
            border: 1.5px solid #334155;
            color: #f1f5f9;
            border-radius: 0.75rem;
            padding: 0.75rem 1rem;
            width: 100%;
            transition: border-color 0.25s, box-shadow 0.25s, background 0.25s;
            outline: none;
            font-size: 0.9rem;
        }

        .form-input:hover {
            border-color: #475569;
            background: #0c1222;
        }

        .form-input:focus {
            border-color: #6366f1;
            box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.2);
            background: #0c1222;
        }

        .form-input::placeholder {
            color: #475569;
        }

        /* Успех */
        @keyframes successPop {
            0% {
                transform: scale(0.5);
                opacity: 0;
            }

            70% {
                transform: scale(1.15);
            }

            100% {
                transform: scale(1);
                opacity: 1;
            }
        }

        .success-icon {
            animation: successPop 0.5s cubic-bezier(.22, .68, 0, 1.2) forwards;
        }

        /* Тряска */
        @keyframes shake {

            0%,
            100% {
                transform: translateX(0);
            }

            20% {
                transform: translateX(-6px);
            }

            40% {
                transform: translateX(6px);
            }

            60% {
                transform: translateX(-4px);
            }

            80% {
                transform: translateX(4px);
            }
        }

        .shake {
            animation: shake 0.4s ease;
        }

        /* Плавающие фигуры */
        .floating-shapes {
            position: fixed;
            inset: 0;
            overflow: hidden;
            pointer-events: none;
            z-index: 0;
        }

        .floating-shapes .shape {
            position: absolute;
            opacity: 0;
            animation: floatUp linear infinite;
            box-shadow: 0 0 15px currentColor;
        }

        @keyframes floatUp {
            0% {
                opacity: 0;
                transform: translateY(100vh) translateX(0) rotate(0deg) scale(0.6);
            }

            10% {
                opacity: 1;
            }

            50% {
                transform: translateY(40vh) translateX(30px) rotate(180deg) scale(1);
            }

            90% {
                opacity: 0.7;
            }

            100% {
                opacity: 0;
                transform: translateY(-15vh) translateX(-15px) rotate(360deg) scale(0.8);
            }
        }

        .shape-circle {
            border-radius: 50%;
        }

        .shape-square {
            border-radius: 20%;
        }

        .shape-diamond {
            border-radius: 20%;
        }

        .glow-spot {
            position: fixed;
            border-radius: 50%;
            filter: blur(80px);
            pointer-events: none;
            z-index: 0;
        }

        /* Номер шага */
        .step-num {
            width: 28px;
            height: 28px;
            border-radius: 50%;
            background: rgba(99, 102, 241, 0.15);
            color: #818cf8;
            font-size: 0.75rem;
            font-weight: 700;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
        }
    </style>
</head>

<body
    class="bg-darkBg text-gray-100 min-h-screen antialiased flex items-start justify-center p-4 md:p-6 pt-10 md:pt-16">

    <!-- Светящиеся пятна -->
    <div class="glow-spot"
        style="width:450px;height:450px;background:radial-gradient(circle,#6366f1,transparent);top:-100px;left:-120px;opacity:0.18;">
    </div>
    <div class="glow-spot"
        style="width:400px;height:400px;background:radial-gradient(circle,#8b5cf6,transparent);bottom:-80px;right:-80px;opacity:0.15;">
    </div>
    <div class="glow-spot"
        style="width:280px;height:280px;background:radial-gradient(circle,#06b6d4,transparent);top:40%;right:8%;opacity:0.12;">
    </div>

    <!-- Плавающие фигуры -->
    <div class="floating-shapes" id="floatingShapes"></div>

    <div class="w-full max-w-xl card-enter" style="position:relative;z-index:1;">

        <!-- Заголовок -->
        <div class="flex items-center gap-3 mb-6">
            <a href="/task/dashboard"
                class="w-10 h-10 bg-gray-800/80 hover:bg-indigo-600 rounded-xl flex items-center justify-center transition-all duration-200 text-gray-400 hover:text-white border border-gray-700 hover:border-indigo-500 shadow-lg">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7" />
                </svg>
            </a>
            <div>
                <h1 class="text-2xl font-bold text-white tracking-tight">Новое поручение</h1>
                <p class="text-gray-500 text-sm">Заполните форму для ручного добавления задачи</p>
            </div>
        </div>

        <!-- Ошибка -->
        {% if error %}
        <div class="bg-red-900/20 border border-red-500/30 rounded-xl p-4 mb-5 flex gap-3 items-start shake">
            <svg class="w-5 h-5 text-red-400 flex-shrink-0 mt-0.5" fill="none" stroke="currentColor"
                viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                    d="M12 8v4m0 4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z" />
            </svg>
            <p class="text-red-400 text-sm font-medium">{{ error }}</p>
        </div>
        {% endif %}

        <!-- Карточка формы -->
        <div class="bg-cardBg rounded-2xl border border-gray-700 shadow-2xl shadow-indigo-500/5 overflow-hidden">

            <!-- Шапка -->
            <div
                class="p-5 border-b border-gray-700/60 bg-gradient-to-r from-gray-800/60 to-gray-800/30 flex items-center gap-3">
                <div class="w-10 h-10 bg-indigo-500/20 text-indigo-400 rounded-xl flex items-center justify-center">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4" />
                    </svg>
                </div>
                <div>
                    <h2 class="text-base font-semibold text-gray-200">Данные поручения</h2>
                    <p class="text-xs text-gray-500">Обязательные поля отмечены <span class="text-red-400">*</span></p>
                </div>
            </div>

            <!-- Форма -->
            <form method="POST" action="/task/add" class="p-6 flex flex-col gap-5" id="taskForm">

                <!-- Заголовок -->
                <div class="flex gap-3 items-start fade-in" style="animation-delay:0.1s">
                    <div class="step-num mt-6">1</div>
                    <div class="flex-1">
                        <label class="text-sm text-gray-400 font-medium mb-1.5 block" for="title">
                            Заголовок поручения <span class="text-red-400">*</span>
                        </label>
                        <input type="text" id="title" name="title" class="form-input"
                            placeholder="Например: Провести инструктаж по ОТ" required
                            value="{{ request.form.get('title', '') }}">
                    </div>
                </div>

                <!-- Исполнитель -->
                <div class="flex gap-3 items-start fade-in" style="animation-delay:0.2s">
                    <div class="step-num mt-6">2</div>
                    <div class="flex-1">
                        <label class="text-sm text-gray-400 font-medium mb-1.5 block" for="executor">
                            Исполнитель (ФИО) <span class="text-red-400">*</span>
                        </label>
                        <div class="relative">
                            <svg class="absolute left-3 top-1/2 -translate-y-1/2 w-4 h-4 text-gray-500" fill="none"
                                stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                    d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z" />
                            </svg>
                            <input type="text" id="executor" name="executor" class="form-input pl-10"
                                placeholder="Например: Иванов И.О." required
                                value="{{ request.form.get('executor', '') }}">
                        </div>
                    </div>
                </div>

                <!-- Срок -->
                <div class="flex gap-3 items-start fade-in" style="animation-delay:0.3s">
                    <div class="step-num mt-6">3</div>
                    <div class="flex-1">
                        <label class="text-sm text-gray-400 font-medium mb-1.5 block" for="deadline">
                            Срок исполнения <span class="text-red-400">*</span>
                        </label>
                        <div class="relative">
                            <svg class="absolute left-3 top-1/2 -translate-y-1/2 w-4 h-4 text-gray-500" fill="none"
                                stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                    d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z" />
                            </svg>
                            <input type="date" id="deadline" name="deadline" class="form-input pl-10" required
                                value="{{ request.form.get('deadline', '') }}">
                        </div>
                    </div>
                </div>

                <!-- Текст -->
                <div class="flex gap-3 items-start fade-in" style="animation-delay:0.4s">
                    <div class="step-num mt-6">4</div>
                    <div class="flex-1">
                        <label class="text-sm text-gray-400 font-medium mb-1.5 block" for="text">
                            Текст поручения <span class="text-gray-600 text-xs font-normal">(необязательно)</span>
                        </label>
                        <textarea id="text" name="text" rows="4" class="form-input resize-none"
                            placeholder="Подробное описание задачи...">{{ request.form.get('text', '') }}</textarea>
                    </div>
                </div>

                <!-- Кнопки -->
                <div class="flex gap-3 pt-3 fade-in" style="animation-delay:0.5s">
                    <button type="submit" id="submitBtn"
                        class="flex-1 bg-indigo-600 hover:bg-indigo-500 active:scale-[0.98] text-white font-semibold py-3.5 rounded-xl transition-all duration-200 shadow-lg shadow-indigo-500/25 flex items-center justify-center gap-2 text-sm">
                        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7" />
                        </svg>
                        Добавить поручение
                    </button>
                    <a href="/task/dashboard"
                        class="flex-1 bg-gray-700/80 hover:bg-gray-600 active:scale-[0.98] text-white font-medium py-3.5 rounded-xl text-center transition-all duration-200 text-sm flex items-center justify-center gap-2 border border-gray-600">
                        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                d="M6 18L18 6M6 6l12 12" />
                        </svg>
                        Отмена
                    </a>
                </div>
            </form>
        </div>

        <p class="text-center text-xs text-gray-600 mt-5">Smart Control · Система контроля поручений</p>
    </div>

    <script>
            // Плавающие фигуры
            (function () {
                var container = document.getElementById('floatingShapes');
                var colors = [
                    'rgba(99,102,241,0.20)', 'rgba(139,92,246,0.18)',
                    'rgba(6,182,212,0.16)', 'rgba(168,85,247,0.14)',
                ];
                var shapes = ['shape-circle', 'shape-square', 'shape-diamond'];

                function spawnShape(isInitial) {
                    var el = document.createElement('div');
                    el.classList.add('shape');
                    el.classList.add(shapes[Math.floor(Math.random() * shapes.length)]);

                    var size = 20 + Math.random() * 50;
                    var color = colors[Math.floor(Math.random() * colors.length)];
                    var dur = 12 + Math.random() * 14;

                    el.style.width = size + 'px';
                    el.style.height = size + 'px';
                    el.style.left = Math.random() * 100 + '%';
                    el.style.bottom = '-60px';
                    el.style.background = color;
                    el.style.border = '1px solid ' + color.replace(/[\d.]+\)$/, '0.35)');
                    el.style.animationDuration = dur + 's';
                    el.style.animationDelay = (isInitial ? 0 : Math.random() * 2) + 's';

                    if (isInitial) {
                        dur = 6 + Math.random() * 6;
                        el.style.animationDuration = dur + 's';
                        el.style.bottom = (Math.random() * 70) + '%';
                    }

                    container.appendChild(el);
                    setTimeout(function () {
                        if (el.parentNode) el.parentNode.removeChild(el);
                    }, (dur + 3) * 1000);
                }

                for (var i = 0; i < 14; i++) {
                    (function (idx) { setTimeout(function () { spawnShape(true); }, idx * 150); })(i);
                }
                setInterval(function () { spawnShape(false); }, 1500);
            })();

        // Валидация: кнопка пульсирует при заполненных полях
        var form = document.getElementById('taskForm');
        var btn = document.getElementById('submitBtn');
        form.addEventListener('input', function () {
            var title = document.getElementById('title').value.trim();
            var executor = document.getElementById('executor').value.trim();
            var deadline = document.getElementById('deadline').value;
            if (title && executor && deadline) {
                btn.classList.add('shadow-indigo-500/40');
                btn.classList.remove('shadow-indigo-500/25');
            } else {
                btn.classList.remove('shadow-indigo-500/40');
                btn.classList.add('shadow-indigo-500/25');
            }
        });
    </script>
</body>

</html>
