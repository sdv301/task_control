<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>403 — Доступ запрещён</title>
    <link href="/static/css/all.min.css" rel="stylesheet">
    <link href="/static/css/inter.css" rel="stylesheet">
    <style>
        :root {
            --primary: #6366f1; --rose: #f43f5e; --amber: #f59e0b;
            --text: #f1f5f9; --text-dim: #94a3b8; --bg: #030712;
            --surface: rgba(15, 23, 42, 0.65); --border: rgba(99, 102, 241, 0.15);
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', system-ui, sans-serif; background: var(--bg); color: var(--text);
            min-height: 100vh; display: flex; align-items: center; justify-content: center;
        }
        .error-container { text-align: center; position: relative; z-index: 1; }
        .error-code {
            font-size: clamp(6rem, 20vw, 14rem); font-weight: 900;
            background: linear-gradient(135deg, var(--rose), var(--amber));
            -webkit-background-clip: text; background-clip: text; -webkit-text-fill-color: transparent; line-height: 1;
        }
        .error-icon { font-size: 3rem; color: var(--rose); margin-bottom: 20px; animation: pulse 2s ease-in-out infinite; }
        @keyframes pulse { 0%, 100% { opacity: 1; transform: scale(1); } 50% { opacity: 0.6; transform: scale(1.1); } }
        .error-title { font-size: clamp(1.2rem, 3vw, 1.8rem); font-weight: 700; margin-bottom: 12px; }
        .error-desc { color: var(--text-dim); font-size: 1rem; margin-bottom: 32px; max-width: 400px; }
        .error-details {
            background: var(--surface); border: 1px solid var(--border); border-radius: 12px;
            padding: 16px 24px; margin-bottom: 32px; font-family: monospace; font-size: 0.85rem;
            color: var(--text-dim); display: inline-block;
        }
        .error-details span { color: var(--amber); }
        .btn-home {
            display: inline-flex; align-items: center; gap: 10px; padding: 14px 32px;
            background: linear-gradient(135deg, var(--primary), var(--rose)); color: #fff;
            text-decoration: none; border-radius: 12px; font-weight: 600; font-size: 1rem;
            transition: all 0.3s; box-shadow: 0 0 20px rgba(99, 102, 241, 0.35);
        }
        .btn-home:hover { transform: translateY(-2px); box-shadow: 0 0 30px rgba(99, 102, 241, 0.5); }
        .bg-glow {
            position: fixed; width: 600px; height: 600px; border-radius: 50%;
            background: radial-gradient(circle, rgba(244, 63, 94, 0.08) 0%, transparent 70%);
            top: 50%; left: 50%; transform: translate(-50%, -50%); pointer-events: none;
        }
    </style>
</head>
<body>
    <div class="bg-glow"></div>
    <div class="error-container">
        <div class="error-icon"><i class="fas fa-shield-halved"></i></div>
        <div class="error-code">403</div>
        <h1 class="error-title">Доступ запрещён</h1>
        <p class="error-desc">У вас нет прав для доступа к этой странице</p>
        <div class="error-details">
            URL: <span id="currentUrl"></span><br>
            Время: <span id="currentTime"></span>
        </div>
        <br>
        <a href="/" class="btn-home"><i class="fas fa-home"></i> Вернуться на главную</a>
    </div>
    <script>
        document.getElementById('currentUrl').textContent = window.location.href;
        document.getElementById('currentTime').textContent = new Date().toLocaleString('ru-RU');
    </script>
</body>
</html>
