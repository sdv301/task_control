version: '3.8'

services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: taskuser
      POSTGRES_PASSWORD: taskpass
      POSTGRES_DB: taskdb
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U taskuser -d taskdb"]
      interval: 5s
      timeout: 5s
      retries: 5

  web:
    build: .
    ports:
      - "5200:5000"
    environment:
      DATABASE_URL: postgresql://taskuser:taskpass@db:5432/taskdb
      SECRET_KEY: change-this-in-production-secret-key
      FLASK_ENV: development
    volumes:
      - ./data:/app/data
      - sqlite-data:/data
    depends_on:
      db:
        condition: service_healthy

volumes:
  pgdata:
  sqlite-data:
